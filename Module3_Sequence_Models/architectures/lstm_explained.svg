<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580">

<defs>
  <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="#5B6573"/>
  </marker>
</defs>

<style>
.title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #1F2937; }
.subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #5B6573; }
.box-title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #1F2937; }
.box-text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #4B5563; }
.small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; }
.arrow { stroke: #5B6573; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
.line { stroke: #94A3B8; stroke-width: 2; fill: none; }
</style>

<rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" fill="#F8FAFC"/>

<text x="600" y="40" text-anchor="middle" class="title">LSTM Cell - Internal Information Flow</text>
<text x="600" y="66" text-anchor="middle" class="subtitle">Long Short-Term Memory uses gated control over a persistent cell state</text>

<rect x="50" y="130" rx="18" ry="18" width="170" height="70" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2.5"/>
<text x="135" y="160" text-anchor="middle" class="box-title">x<tspan baseline-shift="sub">t</tspan></text>
<text x="135" y="182" text-anchor="middle" class="box-text">Current input token</text>

<rect x="50" y="250" rx="18" ry="18" width="170" height="70" fill="#F6ECFF" stroke="#A855F7" stroke-width="2.5"/>
<text x="135" y="280" text-anchor="middle" class="box-title">h<tspan baseline-shift="sub">t-1</tspan></text>
<text x="135" y="302" text-anchor="middle" class="box-text">Previous hidden state</text>

<rect x="50" y="370" rx="18" ry="18" width="170" height="70" fill="#ECFDF3" stroke="#22C55E" stroke-width="2.5"/>
<text x="135" y="400" text-anchor="middle" class="box-title">c<tspan baseline-shift="sub">t-1</tspan></text>
<text x="135" y="422" text-anchor="middle" class="box-text">Previous cell state</text>

<rect x="300" y="80" rx="18" ry="18" width="220" height="80" fill="#FFF8E8" stroke="#F59E0B" stroke-width="2.5"/>
<text x="410" y="112" text-anchor="middle" class="box-title">Forget Gate</text>
<text x="410" y="134" text-anchor="middle" class="box-text">What should be discarded?</text>

<rect x="300" y="190" rx="18" ry="18" width="220" height="80" fill="#ECFDF3" stroke="#22C55E" stroke-width="2.5"/>
<text x="410" y="222" text-anchor="middle" class="box-title">Input Gate</text>
<text x="410" y="244" text-anchor="middle" class="box-text">What new information should enter?</text>

<rect x="300" y="300" rx="18" ry="18" width="220" height="80" fill="#FFEAF1" stroke="#EC4899" stroke-width="2.5"/>
<text x="410" y="332" text-anchor="middle" class="box-title">Candidate State</text>
<text x="410" y="354" text-anchor="middle" class="box-text">Proposed new memory content</text>

<rect x="300" y="410" rx="18" ry="18" width="220" height="80" fill="#E8FBFF" stroke="#06B6D4" stroke-width="2.5"/>
<text x="410" y="442" text-anchor="middle" class="box-title">Output Gate</text>
<text x="410" y="464" text-anchor="middle" class="box-text">What becomes h<tspan baseline-shift="sub">t</tspan>?</text>

<rect x="620" y="220" rx="20" ry="20" width="240" height="110" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
<text x="740" y="255" text-anchor="middle" class="box-title">Cell State Update</text>
<text x="740" y="280" text-anchor="middle" class="box-text">Keep part of c<tspan baseline-shift="sub">t-1</tspan></text>
<text x="740" y="300" text-anchor="middle" class="box-text">Add selected new information</text>

<rect x="950" y="210" rx="18" ry="18" width="170" height="80" fill="#ECFDF3" stroke="#22C55E" stroke-width="2.5"/>
<text x="1035" y="242" text-anchor="middle" class="box-title">c<tspan baseline-shift="sub">t</tspan></text>
<text x="1035" y="264" text-anchor="middle" class="box-text">Updated long-term memory</text>

<rect x="950" y="330" rx="18" ry="18" width="170" height="80" fill="#F6ECFF" stroke="#A855F7" stroke-width="2.5"/>
<text x="1035" y="362" text-anchor="middle" class="box-title">h<tspan baseline-shift="sub">t</tspan></text>
<text x="1035" y="384" text-anchor="middle" class="box-text">Current output state</text>

<line x1="220" y1="165" x2="300" y2="120" class="arrow"/>
<line x1="220" y1="165" x2="300" y2="230" class="arrow"/>
<line x1="220" y1="165" x2="300" y2="340" class="arrow"/>
<line x1="220" y1="165" x2="300" y2="450" class="arrow"/>

<line x1="220" y1="285" x2="300" y2="120" class="arrow"/>
<line x1="220" y1="285" x2="300" y2="230" class="arrow"/>
<line x1="220" y1="285" x2="300" y2="340" class="arrow"/>
<line x1="220" y1="285" x2="300" y2="450" class="arrow"/>

<line x1="220" y1="405" x2="620" y2="245" class="arrow"/>
<line x1="520" y1="120" x2="620" y2="245" class="arrow"/>
<line x1="520" y1="230" x2="620" y2="265" class="arrow"/>
<line x1="520" y1="340" x2="620" y2="295" class="arrow"/>
<line x1="520" y1="450" x2="950" y2="370" class="arrow"/>

<line x1="860" y1="250" x2="950" y2="250" class="arrow"/>
<line x1="860" y1="300" x2="950" y2="370" class="arrow"/>

<text x="600" y="555" text-anchor="middle" class="small">Key idea: LSTM separates memory storage (c_t) from visible output (h_t), enabling selective remembering and forgetting over long sequences.</text>

</svg>
