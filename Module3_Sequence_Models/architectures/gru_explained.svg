<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 560" width="1250" height="560">

<defs>
  <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="#5B6573"/>
  </marker>
</defs>

<style>
.title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #1F2937; }
.subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #5B6573; }
.box-title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #1F2937; }
.box-text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #4B5563; }
.small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; }
.arrow { stroke: #5B6573; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
.line { stroke: #94A3B8; stroke-width: 2; fill: none; }
</style>

<rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" fill="#F8FAFC"/>

<text x="625" y="40" text-anchor="middle" class="title">GRU Cell - Simpler Gated Sequence Memory</text>
<text x="625" y="66" text-anchor="middle" class="subtitle">Gated Recurrent Unit simplifies LSTM while preserving useful memory control</text>

<rect x="60" y="150" rx="18" ry="18" width="180" height="70" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2.5"/>
<text x="150" y="180" text-anchor="middle" class="box-title">x<tspan baseline-shift="sub">t</tspan></text>
<text x="150" y="202" text-anchor="middle" class="box-text">Current input token</text>

<rect x="60" y="280" rx="18" ry="18" width="180" height="70" fill="#F6ECFF" stroke="#A855F7" stroke-width="2.5"/>
<text x="150" y="310" text-anchor="middle" class="box-title">h<tspan baseline-shift="sub">t-1</tspan></text>
<text x="150" y="332" text-anchor="middle" class="box-text">Previous hidden state</text>

<rect x="330" y="110" rx="18" ry="18" width="240" height="90" fill="#FFF8E8" stroke="#F59E0B" stroke-width="2.5"/>
<text x="450" y="145" text-anchor="middle" class="box-title">Update Gate</text>
<text x="450" y="170" text-anchor="middle" class="box-text">How much past state should be kept?</text>

<rect x="330" y="240" rx="18" ry="18" width="240" height="90" fill="#E8FBFF" stroke="#06B6D4" stroke-width="2.5"/>
<text x="450" y="275" text-anchor="middle" class="box-title">Reset Gate</text>
<text x="450" y="300" text-anchor="middle" class="box-text">How much past context should be ignored?</text>

<rect x="330" y="370" rx="18" ry="18" width="240" height="90" fill="#FFEAF1" stroke="#EC4899" stroke-width="2.5"/>
<text x="450" y="405" text-anchor="middle" class="box-title">Candidate Hidden State</text>
<text x="450" y="430" text-anchor="middle" class="box-text">Proposed new state for this timestep</text>

<rect x="690" y="220" rx="20" ry="20" width="240" height="120" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
<text x="810" y="255" text-anchor="middle" class="box-title">State Combination</text>
<text x="810" y="282" text-anchor="middle" class="box-text">Update gate blends:</text>
<text x="810" y="304" text-anchor="middle" class="box-text">old state + candidate state</text>

<rect x="1010" y="240" rx="18" ry="18" width="180" height="90" fill="#ECFDF3" stroke="#22C55E" stroke-width="2.5"/>
<text x="1100" y="275" text-anchor="middle" class="box-title">h<tspan baseline-shift="sub">t</tspan></text>
<text x="1100" y="300" text-anchor="middle" class="box-text">Updated hidden state</text>

<line x1="240" y1="185" x2="330" y2="155" class="arrow"/>
<line x1="240" y1="185" x2="330" y2="285" class="arrow"/>
<line x1="240" y1="185" x2="330" y2="415" class="arrow"/>

<line x1="240" y1="315" x2="330" y2="155" class="arrow"/>
<line x1="240" y1="315" x2="330" y2="285" class="arrow"/>
<line x1="240" y1="315" x2="330" y2="415" class="arrow"/>

<line x1="570" y1="155" x2="690" y2="260" class="arrow"/>
<line x1="570" y1="285" x2="690" y2="280" class="arrow"/>
<line x1="570" y1="415" x2="690" y2="310" class="arrow"/>
<line x1="930" y1="285" x2="1010" y2="285" class="arrow"/>

<text x="625" y="535" text-anchor="middle" class="small">Key idea: GRU uses fewer gates than LSTM and keeps a single recurrent state, making it lighter while still controlling memory flow.</text>

</svg>
