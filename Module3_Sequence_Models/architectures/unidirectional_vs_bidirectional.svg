<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 660" width="1400" height="660">

<defs>
  <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="#5B6573"/>
  </marker>
</defs>

<style>
.title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #1F2937; }
.subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #5B6573; }
.box-title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #1F2937; }
.box-text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #4B5563; }
.small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; }
.arrow { stroke: #5B6573; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
.line { stroke: #94A3B8; stroke-width: 2; fill: none; }
</style>

<rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" fill="#F8FAFC"/>

<text x="700" y="40" text-anchor="middle" class="title">Unidirectional vs Bidirectional Sequence Modeling</text>
<text x="700" y="66" text-anchor="middle" class="subtitle">Directionality changes how much context is available at each position</text>

<rect x="40" y="100" rx="22" ry="22" width="620" height="500" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="2"/>
<rect x="740" y="100" rx="22" ry="22" width="620" height="500" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="2"/>

<text x="350" y="135" text-anchor="middle" class="box-title">Unidirectional</text>
<text x="350" y="158" text-anchor="middle" class="box-text">Reads sequence in one direction only</text>

<text x="1050" y="135" text-anchor="middle" class="box-title">Bidirectional</text>
<text x="1050" y="158" text-anchor="middle" class="box-text">Reads sequence in both directions</text>
<rect x="110" y="240" rx="14" ry="14" width="80" height="48" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2"/><text x="150" y="270" text-anchor="middle" class="box-text">The</text><rect x="220" y="240" rx="14" ry="14" width="80" height="48" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2"/><text x="260" y="270" text-anchor="middle" class="box-text">movie</text><rect x="330" y="240" rx="14" ry="14" width="80" height="48" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2"/><text x="370" y="270" text-anchor="middle" class="box-text">was</text><rect x="440" y="240" rx="14" ry="14" width="80" height="48" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2"/><text x="480" y="270" text-anchor="middle" class="box-text">not</text><rect x="550" y="240" rx="14" ry="14" width="80" height="48" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2"/><text x="590" y="270" text-anchor="middle" class="box-text">good</text><line x1="190" y1="264" x2="220" y2="264" class="arrow"/><line x1="300" y1="264" x2="330" y2="264" class="arrow"/><line x1="410" y1="264" x2="440" y2="264" class="arrow"/><line x1="520" y1="264" x2="550" y2="264" class="arrow"/>
<text x="350" y="340" text-anchor="middle" class="box-title">Context available at token t</text>
<text x="350" y="365" text-anchor="middle" class="box-text">Only past tokens are visible</text>
<text x="350" y="420" text-anchor="middle" class="small">Good when processing streams or when future context is unavailable.</text>
<rect x="810" y="240" rx="14" ry="14" width="80" height="48" fill="#F6ECFF" stroke="#A855F7" stroke-width="2"/><text x="850" y="270" text-anchor="middle" class="box-text">The</text><rect x="920" y="240" rx="14" ry="14" width="80" height="48" fill="#F6ECFF" stroke="#A855F7" stroke-width="2"/><text x="960" y="270" text-anchor="middle" class="box-text">movie</text><rect x="1030" y="240" rx="14" ry="14" width="80" height="48" fill="#F6ECFF" stroke="#A855F7" stroke-width="2"/><text x="1070" y="270" text-anchor="middle" class="box-text">was</text><rect x="1140" y="240" rx="14" ry="14" width="80" height="48" fill="#F6ECFF" stroke="#A855F7" stroke-width="2"/><text x="1180" y="270" text-anchor="middle" class="box-text">not</text><rect x="1250" y="240" rx="14" ry="14" width="80" height="48" fill="#F6ECFF" stroke="#A855F7" stroke-width="2"/><text x="1290" y="270" text-anchor="middle" class="box-text">good</text><line x1="890" y1="252" x2="920" y2="252" class="arrow"/><line x1="1000" y1="252" x2="1030" y2="252" class="arrow"/><line x1="1110" y1="252" x2="1140" y2="252" class="arrow"/><line x1="1220" y1="252" x2="1250" y2="252" class="arrow"/><line x1="920" y1="276" x2="890" y2="276" class="arrow"/><line x1="1030" y1="276" x2="1000" y2="276" class="arrow"/><line x1="1140" y1="276" x2="1110" y2="276" class="arrow"/><line x1="1250" y1="276" x2="1220" y2="276" class="arrow"/>
<text x="1050" y="340" text-anchor="middle" class="box-title">Context available at token t</text>
<text x="1050" y="365" text-anchor="middle" class="box-text">Past + future tokens are combined</text>

<rect x="890" y="420" rx="18" ry="18" width="320" height="90" fill="#ECFDF3" stroke="#22C55E" stroke-width="2.5"/>
<text x="1050" y="455" text-anchor="middle" class="box-title">Combined Representation</text>
<text x="1050" y="480" text-anchor="middle" class="box-text">Forward state + backward state</text>

<text x="700" y="635" text-anchor="middle" class="small">Key idea: Bidirectional models are stronger for full-sentence classification because each token can be interpreted with both past and future context.</text>

</svg>
