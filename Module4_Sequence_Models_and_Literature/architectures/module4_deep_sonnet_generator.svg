<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1032" width="840" height="1032">

    <defs>
      <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
        <polygon points="0 0, 12 6, 0 12" fill="#5B6573"/>
      </marker>
    </defs>
    
<style>
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #1F2937; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #5B6573; }
    .boxtitle { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #1F2937; }
    .boxtext { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #4B5563; }
    .chip { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: white; }
    .arrow { stroke: #5B6573; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
<rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" fill="#F8FAFC"/>
<text x="420.0" y="38" text-anchor="middle" class="title">Deep Sonnet Generator</text>
<text x="420.0" y="64" text-anchor="middle" class="subtitle">Stacked recurrent literary generation model</text>
<rect x="140" y="90" rx="22" ry="22" width="560" height="94" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2.5"/>
<circle cx="174" cy="124" r="18" fill="#3B82F6"/>
<text x="174" y="129" text-anchor="middle" class="chip">1</text>
<text x="420.0" y="126" text-anchor="middle" class="boxtitle">Input</text>
<text x="420.0" y="151" text-anchor="middle" class="boxtext">Padded token sequence</text>
<line x1="420.0" y1="184" x2="420.0" y2="218" class="arrow"/>
<rect x="140" y="218" rx="22" ry="22" width="560" height="94" fill="#F6ECFF" stroke="#A855F7" stroke-width="2.5"/>
<circle cx="174" cy="252" r="18" fill="#A855F7"/>
<text x="174" y="257" text-anchor="middle" class="chip">2</text>
<text x="420.0" y="254" text-anchor="middle" class="boxtitle">Embedding</text>
<text x="420.0" y="279" text-anchor="middle" class="boxtext">total_words  •  100 dimensions</text>
<line x1="420.0" y1="312" x2="420.0" y2="346" class="arrow"/>
<rect x="140" y="346" rx="22" ry="22" width="560" height="94" fill="#FFF8E8" stroke="#F59E0B" stroke-width="2.5"/>
<circle cx="174" cy="380" r="18" fill="#F59E0B"/>
<text x="174" y="385" text-anchor="middle" class="chip">3</text>
<text x="420.0" y="382" text-anchor="middle" class="boxtitle">Bidirectional LSTM</text>
<text x="420.0" y="407" text-anchor="middle" class="boxtext">150 units  •  return_sequences=True</text>
<line x1="420.0" y1="440" x2="420.0" y2="474" class="arrow"/>
<rect x="140" y="474" rx="22" ry="22" width="560" height="94" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
<circle cx="174" cy="508" r="18" fill="#6B7280"/>
<text x="174" y="513" text-anchor="middle" class="chip">4</text>
<text x="420.0" y="510" text-anchor="middle" class="boxtitle">Dropout</text>
<text x="420.0" y="535" text-anchor="middle" class="boxtext">rate = 0.2</text>
<line x1="420.0" y1="568" x2="420.0" y2="602" class="arrow"/>
<rect x="140" y="602" rx="22" ry="22" width="560" height="94" fill="#FFF8E8" stroke="#F59E0B" stroke-width="2.5"/>
<circle cx="174" cy="636" r="18" fill="#F59E0B"/>
<text x="174" y="641" text-anchor="middle" class="chip">5</text>
<text x="420.0" y="638" text-anchor="middle" class="boxtitle">LSTM</text>
<text x="420.0" y="663" text-anchor="middle" class="boxtext">100 units</text>
<line x1="420.0" y1="696" x2="420.0" y2="730" class="arrow"/>
<rect x="140" y="730" rx="22" ry="22" width="560" height="94" fill="#FFEAF1" stroke="#EC4899" stroke-width="2.5"/>
<circle cx="174" cy="764" r="18" fill="#EC4899"/>
<text x="174" y="769" text-anchor="middle" class="chip">6</text>
<text x="420.0" y="766" text-anchor="middle" class="boxtitle">Dense Hidden Layer</text>
<text x="420.0" y="791" text-anchor="middle" class="boxtext">total_words / 2  •  ReLU</text>
<text x="420.0" y="809" text-anchor="middle" class="boxtext">L2 regularization</text>
<line x1="420.0" y1="824" x2="420.0" y2="858" class="arrow"/>
<rect x="140" y="858" rx="22" ry="22" width="560" height="94" fill="#E8FBFF" stroke="#06B6D4" stroke-width="2.5"/>
<circle cx="174" cy="892" r="18" fill="#06B6D4"/>
<text x="174" y="897" text-anchor="middle" class="chip">7</text>
<text x="420.0" y="894" text-anchor="middle" class="boxtitle">Output</text>
<text x="420.0" y="919" text-anchor="middle" class="boxtext">Dense(total_words, Softmax)</text>
<text x="420.0" y="937" text-anchor="middle" class="boxtext">Predict next token</text>
</svg>