<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720">
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#5B6573"/>
    </marker>
  </defs>

  <style>
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #1F2937; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #5B6573; }
    .boxtitle { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #1F2937; }
    .boxtext { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #4B5563; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #6B7280; }
    .chip { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: #FFFFFF; }
    .arrow { stroke: #5B6573; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>

  <rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" fill="#F8FAFC"/>

  <text x="800" y="42" text-anchor="middle" class="title">Module 4 Language Generation Pipeline</text>
  <text x="800" y="70" text-anchor="middle" class="subtitle">From raw literary text to autoregressive next-word generation</text>

  <!-- Row 1 -->
  <rect x="60" y="135" rx="22" ry="22" width="300" height="125" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2.5"/>
  <circle cx="98" cy="171" r="18" fill="#3B82F6"/>
  <text x="98" y="176" text-anchor="middle" class="chip">1</text>
  <text x="210" y="175" text-anchor="middle" class="boxtitle">Raw Text Corpus</text>
  <text x="210" y="205" text-anchor="middle" class="boxtext">Lyrics, sonnets, or verse lines</text>

  <rect x="430" y="135" rx="22" ry="22" width="300" height="125" fill="#ECFDF3" stroke="#22C55E" stroke-width="2.5"/>
  <circle cx="468" cy="171" r="18" fill="#22C55E"/>
  <text x="468" y="176" text-anchor="middle" class="chip">2</text>
  <text x="580" y="175" text-anchor="middle" class="boxtitle">Tokenizer</text>
  <text x="580" y="205" text-anchor="middle" class="boxtext">Build vocabulary and token IDs</text>

  <rect x="800" y="135" rx="22" ry="22" width="300" height="125" fill="#F6ECFF" stroke="#A855F7" stroke-width="2.5"/>
  <circle cx="838" cy="171" r="18" fill="#A855F7"/>
  <text x="838" y="176" text-anchor="middle" class="chip">3</text>
  <text x="950" y="175" text-anchor="middle" class="boxtitle">N-gram Sequences</text>
  <text x="950" y="205" text-anchor="middle" class="boxtext">Create growing subsequences</text>
  <text x="950" y="225" text-anchor="middle" class="boxtext">from each line</text>

  <rect x="1170" y="135" rx="22" ry="22" width="300" height="125" fill="#FFF8E8" stroke="#F59E0B" stroke-width="2.5"/>
  <circle cx="1208" cy="171" r="18" fill="#F59E0B"/>
  <text x="1208" y="176" text-anchor="middle" class="chip">4</text>
  <text x="1320" y="175" text-anchor="middle" class="boxtitle">Pre-padding</text>
  <text x="1320" y="205" text-anchor="middle" class="boxtext">Align shorter contexts</text>
  <text x="1320" y="225" text-anchor="middle" class="boxtext">to a fixed length</text>

  <line x1="360" y1="198" x2="430" y2="198" class="arrow"/>
  <line x1="730" y1="198" x2="800" y2="198" class="arrow"/>
  <line x1="1100" y1="198" x2="1170" y2="198" class="arrow"/>

  <!-- Transition to row 2 -->
  <path d="M 1320 260 L 1320 315 L 1170 315" class="arrow"/>

  <!-- Row 2 -->
  <rect x="1170" y="315" rx="22" ry="22" width="300" height="125" fill="#FFEAF1" stroke="#EC4899" stroke-width="2.5"/>
  <circle cx="1208" cy="351" r="18" fill="#EC4899"/>
  <text x="1208" y="356" text-anchor="middle" class="chip">5</text>
  <text x="1320" y="355" text-anchor="middle" class="boxtitle">Predictors / Labels</text>
  <text x="1320" y="385" text-anchor="middle" class="boxtext">x = partial sequence</text>
  <text x="1320" y="405" text-anchor="middle" class="boxtext">y = next token</text>

  <rect x="800" y="315" rx="22" ry="22" width="300" height="125" fill="#E8FBFF" stroke="#06B6D4" stroke-width="2.5"/>
  <circle cx="838" cy="351" r="18" fill="#06B6D4"/>
  <text x="838" y="356" text-anchor="middle" class="chip">6</text>
  <text x="950" y="355" text-anchor="middle" class="boxtitle">Generator Model</text>
  <text x="950" y="385" text-anchor="middle" class="boxtext">Embedding + recurrent layers</text>
  <text x="950" y="405" text-anchor="middle" class="boxtext">+ vocabulary softmax</text>

  <rect x="430" y="315" rx="22" ry="22" width="300" height="125" fill="#FFF3E6" stroke="#F97316" stroke-width="2.5"/>
  <circle cx="468" cy="351" r="18" fill="#F97316"/>
  <text x="468" y="356" text-anchor="middle" class="chip">7</text>
  <text x="580" y="355" text-anchor="middle" class="boxtitle">Next-word Prediction</text>
  <text x="580" y="385" text-anchor="middle" class="boxtext">Choose next token from</text>
  <text x="580" y="405" text-anchor="middle" class="boxtext">softmax distribution</text>

  <rect x="60" y="315" rx="22" ry="22" width="300" height="125" fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5"/>
  <circle cx="98" cy="351" r="18" fill="#6B7280"/>
  <text x="98" y="356" text-anchor="middle" class="chip">8</text>
  <text x="210" y="355" text-anchor="middle" class="boxtitle">Autoregressive Loop</text>
  <text x="210" y="385" text-anchor="middle" class="boxtext">Append predicted token</text>
  <text x="210" y="405" text-anchor="middle" class="boxtext">and repeat generation</text>

  <line x1="1170" y1="378" x2="1100" y2="378" class="arrow"/>
  <line x1="800" y1="378" x2="730" y2="378" class="arrow"/>
  <line x1="430" y1="378" x2="360" y2="378" class="arrow"/>

  <!-- Footer -->
  <text x="800" y="525" text-anchor="middle" class="boxtext">Key idea: next-word prediction becomes text generation when the model’s output is fed back into the next input context.</text>
</svg>
