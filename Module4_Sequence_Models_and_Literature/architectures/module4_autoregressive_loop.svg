<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">

    <defs>
      <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
        <polygon points="0 0, 12 6, 0 12" fill="#5B6573"/>
      </marker>
    </defs>
    
<style>
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #1F2937; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #5B6573; }
    .boxtitle { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; fill: #1F2937; }
    .boxtext { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #4B5563; }
    .arrow { stroke: #5B6573; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    .chip { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: white; }
    </style>
<rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" fill="#F8FAFC"/>
<text x="600" y="42" text-anchor="middle" class="title">Autoregressive Generation Loop</text>
<text x="600" y="68" text-anchor="middle" class="subtitle">How a trained next-word model becomes a text generator</text>
<rect x="80" y="170" rx="20" ry="20" width="220" height="110" fill="#EAF4FF" stroke="#3B82F6" stroke-width="2.5"/>
<circle cx="108" cy="198" r="16" fill="#3B82F6"/>
<text x="108" y="203" text-anchor="middle" class="chip">1</text>
<text x="190.0" y="208" text-anchor="middle" class="boxtitle">Seed Text</text>
<text x="190.0" y="236" text-anchor="middle" class="boxtext">Start with a prompt</text>
<text x="190.0" y="254" text-anchor="middle" class="boxtext">e.g. "the stars were"</text>
<rect x="330" y="170" rx="20" ry="20" width="220" height="110" fill="#ECFDF3" stroke="#22C55E" stroke-width="2.5"/>
<circle cx="358" cy="198" r="16" fill="#22C55E"/>
<text x="358" y="203" text-anchor="middle" class="chip">2</text>
<text x="440.0" y="208" text-anchor="middle" class="boxtitle">Tokenize + Pad</text>
<text x="440.0" y="236" text-anchor="middle" class="boxtext">Prepare current context</text>
<text x="440.0" y="254" text-anchor="middle" class="boxtext">for model input</text>
<rect x="580" y="170" rx="20" ry="20" width="220" height="110" fill="#F6ECFF" stroke="#A855F7" stroke-width="2.5"/>
<circle cx="608" cy="198" r="16" fill="#A855F7"/>
<text x="608" y="203" text-anchor="middle" class="chip">3</text>
<text x="690.0" y="208" text-anchor="middle" class="boxtitle">Predict Next Word</text>
<text x="690.0" y="236" text-anchor="middle" class="boxtext">Vocabulary softmax</text>
<text x="690.0" y="254" text-anchor="middle" class="boxtext">distribution</text>
<rect x="830" y="170" rx="20" ry="20" width="220" height="110" fill="#FFF8E8" stroke="#F59E0B" stroke-width="2.5"/>
<circle cx="858" cy="198" r="16" fill="#F59E0B"/>
<text x="858" y="203" text-anchor="middle" class="chip">4</text>
<text x="940.0" y="208" text-anchor="middle" class="boxtitle">Append Prediction</text>
<text x="940.0" y="236" text-anchor="middle" class="boxtext">Add generated token</text>
<text x="940.0" y="254" text-anchor="middle" class="boxtext">to the seed</text>
<line x1="300" y1="225" x2="330" y2="225" class="arrow"/>
<line x1="550" y1="225" x2="580" y2="225" class="arrow"/>
<line x1="800" y1="225" x2="830" y2="225" class="arrow"/>
<path d="M 1050 280 C 1080 360, 1010 430, 600 430 C 240 430, 160 350, 160 280" class="arrow"/>
<text x="600" y="470" text-anchor="middle" class="boxtext">Repeat until the desired number of words is generated.</text>
</svg>